<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinkFlow Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg-deep:#0c0d14;
  --bg-panel:#13141d;
  --bg-hover:#1c1e2c;
  --bg-active:#252840;
  --accent:#6366f1;
  --accent-dim:#4f52cc;
  --accent-glow:rgba(99,102,241,.3);
  --text-a:#f0f1f8;
  --text-b:#8b8faa;
  --text-c:#3e4160;
  --border:rgba(255,255,255,.07);
  --border-h:rgba(255,255,255,.13);
  --border-acc:rgba(99,102,241,.45);
}

html,body{height:100%;overflow:hidden}
body{background:var(--bg-deep);color:var(--text-a);font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column}

/* ===== HEADER ===== */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  height:50px;padding:0 18px;flex-shrink:0;
  background:var(--bg-panel);border-bottom:1px solid var(--border);
  gap:12px;
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.5px}
.brand-name em{color:var(--accent);font-style:normal}
.brand-tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-c);background:var(--bg-hover);padding:2px 7px;border-radius:4px;border:1px solid var(--border)}
#savedBadge{font-family:'DM Mono',monospace;font-size:9px;color:#22c55e;letter-spacing:1.5px;opacity:0;transition:opacity .4s}

.hdr-btns{display:flex;gap:5px;flex-shrink:0}
.btn{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  padding:5px 13px;border-radius:7px;border:1px solid var(--border);
  background:var(--bg-hover);color:var(--text-b);cursor:pointer;
  transition:all .15s;white-space:nowrap
}
.btn:hover{background:var(--bg-active);color:var(--text-a);border-color:var(--border-h)}
.btn-primary{background:var(--accent);color:#fff;border-color:transparent}
.btn-primary:hover{background:var(--accent-dim)}
.btn-danger:hover{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.35);color:#f87171}

/* ===== MAIN ===== */
#main{display:flex;flex:1;overflow:hidden}

/* ===== SIDEBAR ===== */
#sb{
  width:256px;flex-shrink:0;
  background:var(--bg-panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
  padding:14px;gap:14px;
}
#sb::-webkit-scrollbar{width:3px}
#sb::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.sl{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-c);letter-spacing:2px;text-transform:uppercase;padding:0 2px}

/* Mode toggle */
.mode-wrap{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:var(--bg-deep);padding:3px;border-radius:9px;border:1px solid var(--border)}
.mode-btn{
  padding:7px 4px;border-radius:6px;border:none;background:transparent;
  color:var(--text-b);font-family:'DM Mono',monospace;font-size:10px;
  cursor:pointer;transition:all .15s;text-align:center
}
.mode-btn.active{background:var(--bg-active);color:var(--text-a);box-shadow:0 1px 6px rgba(0,0,0,.4)}

/* Category grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.cat-opt{
  padding:8px 5px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg-deep);color:var(--text-b);
  font-size:10px;cursor:pointer;transition:all .15s;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:4px
}
.cat-dot{width:8px;height:8px;border-radius:50%}
.cat-opt:hover{border-color:var(--border-h);background:var(--bg-hover);color:var(--text-a)}
.cat-opt.sel{background:var(--bg-active);color:var(--text-a)}

/* Input */
#nodeInput{
  width:100%;height:96px;background:var(--bg-deep);border:1px solid var(--border);
  border-radius:9px;color:var(--text-a);font-family:'Noto Sans JP',sans-serif;
  font-size:12px;padding:9px 11px;resize:none;outline:none;transition:border-color .15s;
  line-height:1.65
}
#nodeInput:focus{border-color:var(--border-acc)}
#nodeInput::placeholder{color:var(--text-c)}

.add-btn{
  width:100%;padding:11px;background:var(--accent);color:#fff;
  border:none;border-radius:9px;font-family:'Syne',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;
  letter-spacing:.3px
}
.add-btn:hover{background:var(--accent-dim);transform:translateY(-1px);box-shadow:0 4px 18px var(--accent-glow)}
.add-btn:active{transform:translateY(0)}

.divider{height:1px;background:var(--border);margin:0 -14px}

/* Shortcuts */
.sc-list{display:flex;flex-direction:column;gap:5px}
.sc-row{display:flex;justify-content:space-between;align-items:center}
.sc-key{font-family:'DM Mono',monospace;font-size:9px;background:var(--bg-hover);border:1px solid var(--border);padding:2px 6px;border-radius:4px;color:var(--text-b)}
.sc-desc{font-size:10px;color:var(--text-c)}

/* ===== CANVAS ===== */
#cvs{
  flex:1;position:relative;overflow:hidden;
  background:#f9fafb;
  background-image:radial-gradient(circle,#c8cfde 1px,transparent 1px);
  background-size:22px 22px;
}

/* ===== NODES ===== */
.node{position:absolute;cursor:grab;user-select:none;z-index:20;min-width:130px;min-height:64px;transition:filter .15s}
.node:active{cursor:grabbing}
.node.selected{filter:drop-shadow(0 0 10px rgba(99,102,241,.75))}

.node-box{
  width:100%;height:100%;border-radius:11px;border:1.5px solid;
  background:#fff;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 2px 10px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
  transition:box-shadow .15s
}
.node:hover .node-box{box-shadow:0 6px 22px rgba(0,0,0,.13),0 2px 6px rgba(0,0,0,.06)}

.node-hdr{padding:5px 9px 4px;display:flex;align-items:center;gap:5px;border-bottom:1px solid;flex-shrink:0}
.node-hdr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.node-hdr-lbl{font-family:'DM Mono',monospace;font-size:7.5px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;opacity:.75}
.node-body{padding:7px 9px;font-size:12px;font-weight:600;line-height:1.55;flex:1;overflow:hidden;word-break:break-all}

/* Category palettes */
.cat-assets  {border-color:#93c5fd}.cat-assets  .node-hdr{background:#eff6ff;border-color:#bfdbfe}.cat-assets  .node-hdr-dot{background:#3b82f6}.cat-assets  .node-hdr-lbl{color:#1d4ed8}.cat-assets  .node-body{color:#1e3a8a}
.cat-reality {border-color:#cbd5e1}.cat-reality .node-hdr{background:#f8fafc;border-color:#e2e8f0}.cat-reality .node-hdr-dot{background:#94a3b8}.cat-reality .node-hdr-lbl{color:#475569}.cat-reality .node-body{color:#1e293b}
.cat-emotion {border-color:#f9a8d4}.cat-emotion .node-hdr{background:#fdf2f8;border-color:#fbcfe8}.cat-emotion .node-hdr-dot{background:#ec4899}.cat-emotion .node-hdr-lbl{color:#be185d}.cat-emotion .node-body{color:#831843}
.cat-projected{border-color:#fcd34d}.cat-projected .node-hdr{background:#fffbeb;border-color:#fde68a}.cat-projected .node-hdr-dot{background:#f59e0b}.cat-projected .node-hdr-lbl{color:#b45309}.cat-projected .node-body{color:#78350f}
.cat-mechanism{border-color:#c4b5fd}.cat-mechanism .node-hdr{background:#f5f3ff;border-color:#ddd6fe}.cat-mechanism .node-hdr-dot{background:#8b5cf6}.cat-mechanism .node-hdr-lbl{color:#6d28d9}.cat-mechanism .node-body{color:#4c1d95}
.cat-ideal   {border-color:#6ee7b7}.cat-ideal   .node-hdr{background:#ecfdf5;border-color:#a7f3d0}.cat-ideal   .node-hdr-dot{background:#10b981}.cat-ideal   .node-hdr-lbl{color:#047857}.cat-ideal   .node-body{color:#064e3b}

/* Text-only node */
.node-text-only{
  border:none;background:transparent;
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:20px;color:#1e293b;
  white-space:pre-wrap;word-break:break-all;
  padding:4px;
}

/* Resizer handle */
.resizer{
  width:16px;height:16px;position:absolute;right:0;bottom:0;
  cursor:se-resize;z-index:30;opacity:0;transition:opacity .2s
}
.resizer::after{
  content:'';position:absolute;right:3px;bottom:3px;
  width:7px;height:7px;
  border-right:2px solid var(--accent);
  border-bottom:2px solid var(--accent);
  border-radius:0 0 2px 0
}
.node:hover .resizer{opacity:1}

/* SVG layer */
#svgArea{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.drawn-line{pointer-events:auto;cursor:pointer;stroke:#6366f1;stroke-width:2.5;fill:none;stroke-linecap:round;transition:stroke .2s}
.drawn-line:hover{stroke:#f43f5e;stroke-width:4}
.temp-line{stroke:#94a3b8;stroke-width:1.5;stroke-dasharray:6,4;fill:none}

/* Inner canvas container */
#ci{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* ===== EDIT POPUP ===== */
#editPop{
  position:fixed;background:var(--bg-panel);border:1px solid var(--border-acc);
  border-radius:11px;padding:13px;z-index:9000;width:230px;
  box-shadow:0 16px 48px rgba(0,0,0,.55);display:none
}
#editPop .pop-title{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-c);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
#editTA{
  width:100%;background:var(--bg-deep);border:1px solid var(--border);
  border-radius:7px;color:var(--text-a);font-family:'Noto Sans JP',sans-serif;
  font-size:12px;padding:8px;resize:none;outline:none;height:80px;
  transition:border-color .15s
}
#editTA:focus{border-color:var(--border-acc)}
.pop-acts{display:flex;gap:5px;margin-top:8px}
.pop-btn{
  flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg-hover);color:var(--text-b);font-family:'DM Mono',monospace;
  font-size:10px;cursor:pointer;transition:all .15s
}
.pop-btn:hover{background:var(--bg-active);color:var(--text-a)}
.pop-btn.save{background:var(--accent);color:#fff;border-color:transparent}
.pop-btn.del{color:#f87171}
.pop-btn.del:hover{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3)}

/* ===== STATUS BAR ===== */
#sbar{
  height:26px;background:var(--bg-panel);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:18px;
  font-family:'DM Mono',monospace;font-size:9.5px;color:var(--text-c);
  flex-shrink:0
}
#sbar b{color:var(--text-b);font-weight:500}
#sbar .sbar-right{margin-left:auto;color:var(--text-c)}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(12px);
  background:#1e293b;color:#e2e8f0;padding:9px 18px;border-radius:9px;
  font-family:'DM Mono',monospace;font-size:10px;z-index:9999;
  opacity:0;transition:all .25s;pointer-events:none;
  border:1px solid rgba(255,255,255,.1);box-shadow:0 8px 28px rgba(0,0,0,.4)
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* node pop-in animation */
@keyframes nodeIn{from{opacity:0;transform:scale(.9) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.node-animate{animation:nodeIn .18s ease-out forwards}
</style>
</head>
<body>

<!-- Header -->
<div id="hdr">
  <div class="brand">
    <div class="brand-name">ThinkFlow <em>Pro</em></div>
    <div class="brand-tag">v3.0</div>
    <div id="savedBadge">● SAVED</div>
  </div>
  <div class="hdr-btns">
    <button class="btn" onclick="undo()">↩ Undo</button>
    <button class="btn" onclick="exportPDF()">↓ PDF</button>
    <button class="btn" onclick="downloadData()">↓ 保存</button>
    <button class="btn" onclick="importData()">↑ 読込</button>
    <button class="btn btn-danger" onclick="clearAll()">全消去</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <!-- Sidebar -->
  <div id="sb">
    <div class="sl">モード</div>
    <div class="mode-wrap">
      <button class="mode-btn active" id="modeBoxBtn" onclick="setMode('box')">枠あり要素</button>
      <button class="mode-btn" id="modeTxtBtn" onclick="setMode('text')">枠なしタイトル</button>
    </div>

    <div id="catSec">
      <div class="sl" style="margin-bottom:8px">カテゴリー</div>
      <div class="cat-grid">
        <div class="cat-opt sel" data-cat="資産・実績" data-cls="cat-assets" data-color="#3b82f6" data-lbl="Assets" onclick="selCat(this)">
          <div class="cat-dot" style="background:#3b82f6"></div><span>資産・実績</span>
        </div>
        <div class="cat-opt" data-cat="現実・制約" data-cls="cat-reality" data-color="#94a3b8" data-lbl="Reality" onclick="selCat(this)">
          <div class="cat-dot" style="background:#94a3b8"></div><span>現実・制約</span>
        </div>
        <div class="cat-opt" data-cat="感情・動機" data-cls="cat-emotion" data-color="#ec4899" data-lbl="Internal" onclick="selCat(this)">
          <div class="cat-dot" style="background:#ec4899"></div><span>感情・動機</span>
        </div>
        <div class="cat-opt" data-cat="想定推移" data-cls="cat-projected" data-color="#f59e0b" data-lbl="Projected" onclick="selCat(this)">
          <div class="cat-dot" style="background:#f59e0b"></div><span>想定推移</span>
        </div>
        <div class="cat-opt" data-cat="仕組み・手段" data-cls="cat-mechanism" data-color="#8b5cf6" data-lbl="Mechanism" onclick="selCat(this)">
          <div class="cat-dot" style="background:#8b5cf6"></div><span>仕組み・手段</span>
        </div>
        <div class="cat-opt" data-cat="理想・目的" data-cls="cat-ideal" data-color="#10b981" data-lbl="Ideal" onclick="selCat(this)">
          <div class="cat-dot" style="background:#10b981"></div><span>理想・目的</span>
        </div>
      </div>
    </div>

    <div>
      <div class="sl" style="margin-bottom:8px">テキスト入力</div>
      <textarea id="nodeInput" placeholder="内容を入力...&#10;(Ctrl+Enter で追加)"></textarea>
    </div>
    <button class="add-btn" onclick="createNode()">+ キャンバスに追加</button>

    <div class="divider"></div>

    <div>
      <div class="sl" style="margin-bottom:8px">操作ガイド</div>
      <div class="sc-list">
        <div class="sc-row"><span class="sc-key">Click</span><span class="sc-desc">ノード選択</span></div>
        <div class="sc-row"><span class="sc-key">選択×2</span><span class="sc-desc">矢印線を引く</span></div>
        <div class="sc-row"><span class="sc-key">Drag</span><span class="sc-desc">ノード移動</span></div>
        <div class="sc-row"><span class="sc-key">DblClick</span><span class="sc-desc">テキスト編集</span></div>
        <div class="sc-row"><span class="sc-key">Right Click</span><span class="sc-desc">削除・編集メニュー</span></div>
        <div class="sc-row"><span class="sc-key">BG Drag</span><span class="sc-desc">フリー線を描く</span></div>
        <div class="sc-row"><span class="sc-key">Ctrl+Z</span><span class="sc-desc">Undo</span></div>
      </div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="cvs" onmousedown="onCvsDown(event)">
    <svg id="svgArea"></svg>
    <div id="ci"></div>
  </div>
</div>

<!-- Status bar -->
<div id="sbar">
  <span>Nodes: <b id="nc">0</b></span>
  <span>Connections: <b id="cc">0</b></span>
  <span id="modeInd" style="color:var(--accent)">MODE: BOX</span>
  <span class="sbar-right">DoubleClick=編集 / RightClick=削除メニュー / Line click=削除</span>
</div>

<!-- Edit Popup -->
<div id="editPop">
  <div class="pop-title">テキスト編集</div>
  <textarea id="editTA" onkeydown="editKeydown(event)"></textarea>
  <div class="pop-acts">
    <button class="pop-btn save" onclick="saveEdit()">保存</button>
    <button class="pop-btn del" onclick="delCurrent()">削除</button>
    <button class="pop-btn" onclick="closeEdit()">閉じる</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ======== STATE ========
let curMode = 'box';
let nodes = [], conns = [], selId = null;
let undoStack = [];
let editId = null;
const SKEY = 'thinkflow_pro_v3';
const svgEl = document.getElementById('svgArea');
const cvsEl = document.getElementById('cvs');
const ciEl = document.getElementById('ci');

// ======== INIT ========
window.addEventListener('load', () => { loadLocal(); updateStatus(); });
window.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); }
  if (e.key==='Escape') { clearSel(); closeEdit(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') {
    if (document.activeElement===document.getElementById('nodeInput')) createNode();
    if (document.activeElement===document.getElementById('editTA')) saveEdit();
  }
});

// ======== MODE & CATEGORY ========
let curCat = { cat:'資産・実績', cls:'cat-assets', color:'#3b82f6', lbl:'Assets' };

function setMode(m) {
  curMode = m;
  document.getElementById('modeBoxBtn').classList.toggle('active', m==='box');
  document.getElementById('modeTxtBtn').classList.toggle('active', m==='text');
  document.getElementById('catSec').style.display = m==='box' ? '' : 'none';
  document.getElementById('modeInd').textContent = 'MODE: ' + (m==='box' ? 'BOX' : 'TEXT');
}

function selCat(el) {
  document.querySelectorAll('.cat-opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  curCat = { cat:el.dataset.cat, cls:el.dataset.cls, color:el.dataset.color, lbl:el.dataset.lbl };
}

// ======== NODE CREATION ========
function createNode(data=null, isUndo=false) {
  const inputEl = document.getElementById('nodeInput');
  const text = data ? data.text : inputEl.value.trim();
  if (!text) { if(!data) showToast('テキストを入力してください'); return; }
  if (!isUndo && !data) pushUndo();

  const id = data ? data.id : 'n_'+Date.now();
  const type = data ? data.type : curMode;
  const cat = data ? data.cat : curCat.cat;

  // Look up cat info
  const catEl = document.querySelector(`.cat-opt[data-cat="${cat}"]`);
  const catInfo = catEl
    ? { cls: catEl.dataset.cls, color: catEl.dataset.color, lbl: catEl.dataset.lbl }
    : { cls:'cat-ideal', color:'#10b981', lbl:'Ideal' };

  const el = document.createElement('div');
  el.id = id;
  el.className = 'node pointer-events-auto';
  el.setAttribute('data-type', type);
  el.setAttribute('data-cat', cat||'');
  el.setAttribute('data-text', text);
  el.setAttribute('data-color', data ? (data.color||catInfo.color) : catInfo.color);

  if (type==='text') {
    el.classList.add('node-text-only');
    el.innerHTML = esc(text);
  } else {
    el.innerHTML = `
      <div class="node-box ${catInfo.cls}">
        <div class="node-hdr"><div class="node-hdr-dot"></div><div class="node-hdr-lbl">${catInfo.lbl}</div></div>
        <div class="node-body">${esc(text).replace(/\n/g,'<br>')}</div>
        <div class="resizer"></div>
      </div>`;
  }

  el.style.left = data?.left || '80px';
  el.style.top  = data?.top  || '80px';
  if (data?.width)  el.style.width  = data.width;
  if (data?.height) el.style.height = data.height;

  bindNodeEvents(el, id);
  if (type!=='text') initResize(el, id);

  ciEl.appendChild(el);
  nodes.push({ id, el, lines:[] });

  if (!data) { inputEl.value=''; saveLocal(); showToast('追加しました'); }
  if (!isUndo) el.classList.add('node-animate');
  updateStatus();
}

function bindNodeEvents(el, id) {
  let dragMoved = false;

  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('resizer')) return;
    e.stopPropagation();
    pushUndo();
    const r = cvsEl.getBoundingClientRect();
    const sx = e.clientX - el.getBoundingClientRect().left;
    const sy = e.clientY - el.getBoundingClientRect().top;
    dragMoved = false;

    const mm = me => {
      dragMoved = true;
      el.style.left = Math.max(0, me.clientX - r.left - sx) + 'px';
      el.style.top  = Math.max(0, me.clientY - r.top  - sy) + 'px';
      nodes.find(n=>n.id===id)?.lines.forEach(l=>{ try{l.position()}catch(e){} });
    };
    const mu = () => {
      document.removeEventListener('mousemove', mm);
      document.removeEventListener('mouseup', mu);
      if (dragMoved) saveLocal();
    };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });

  el.addEventListener('click', e => {
    e.stopPropagation();
    if (dragMoved) { dragMoved=false; return; }
    if (!selId) {
      selId = id; el.classList.add('selected');
    } else if (selId===id) {
      clearSel();
    } else {
      pushUndo();
      drawLL(selId, id);
      clearSel();
    }
  });

  el.addEventListener('dblclick', e => { e.stopPropagation(); openEdit(id); });

  el.addEventListener('contextmenu', e => { e.preventDefault(); openEdit(id); });
}

function initResize(el, id) {
  const r = el.querySelector('.resizer');
  if (!r) return;
  r.addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    pushUndo();
    const sx=e.clientX, sy=e.clientY, sw=el.offsetWidth, sh=el.offsetHeight;
    const mm = me => {
      el.style.width  = Math.max(130, sw + me.clientX - sx) + 'px';
      el.style.height = Math.max(64,  sh + me.clientY - sy) + 'px';
      nodes.find(n=>n.id===id)?.lines.forEach(l=>{ try{l.position()}catch(e){} });
    };
    const mu = () => {
      document.removeEventListener('mousemove', mm);
      document.removeEventListener('mouseup', mu);
      saveLocal();
    };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });
}

// ======== LEADER LINES ========
function drawLL(startId, endId) {
  const sEl = document.getElementById(startId);
  const eEl = document.getElementById(endId);
  if (!sEl || !eEl) return;
  const color = sEl.getAttribute('data-color') || '#6366f1';
  try {
    const line = new LeaderLine(sEl, eEl, {
      color, size:2.5, endPlug:'arrow2', endPlugSize:1.4,
      startSocket:'auto', endSocket:'auto'
    });
    nodes.find(n=>n.id===startId)?.lines.push(line);
    nodes.find(n=>n.id===endId)?.lines.push(line);
    conns.push({ line, startId, endId, color });
    saveLocal(); updateStatus();
  } catch(err) { console.warn('LL error', err); }
}

// ======== FREE DRAW ========
function onCvsDown(e) {
  const validTargets = [cvsEl, svgEl, ciEl];
  if (!validTargets.includes(e.target)) return;
  if (e.button !== 0) return;
  pushUndo();

  const r = cvsEl.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  let moved = false;

  const tl = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  tl.setAttribute('class','temp-line');
  svgEl.appendChild(tl);

  const mm = me => {
    moved = true;
    const cx = me.clientX - r.left, cy = me.clientY - r.top;
    const pts = Math.abs(cx-sx)>Math.abs(cy-sy)
      ? `${sx},${sy} ${cx},${sy}` : `${sx},${sy} ${sx},${cy}`;
    tl.setAttribute('points', pts);
  };
  const mu = () => {
    document.removeEventListener('mousemove', mm);
    document.removeEventListener('mouseup', mu);
    const p = tl.getAttribute('points');
    tl.remove();
    if (moved && p) {
      const l = document.createElementNS('http://www.w3.org/2000/svg','polyline');
      l.setAttribute('class','drawn-line');
      l.setAttribute('points', p);
      l.addEventListener('click', ev => {
        ev.stopPropagation(); pushUndo(); l.remove(); saveLocal();
      });
      svgEl.appendChild(l);
      saveLocal();
    }
  };
  document.addEventListener('mousemove', mm);
  document.addEventListener('mouseup', mu);
}

// ======== EDIT POPUP ========
function openEdit(id) {
  editId = id;
  const n = nodes.find(n=>n.id===id);
  if (!n) return;
  document.getElementById('editTA').value = n.el.getAttribute('data-text')||'';
  const pop = document.getElementById('editPop');
  const r = n.el.getBoundingClientRect();
  pop.style.display = 'block';
  pop.style.left = Math.min(r.right+8, window.innerWidth-248)+'px';
  pop.style.top  = Math.min(Math.max(r.top, 60), window.innerHeight-200)+'px';
  setTimeout(()=>document.getElementById('editTA').focus(),50);
}

function saveEdit() {
  const n = nodes.find(n=>n.id===editId);
  if (!n) return closeEdit();
  const txt = document.getElementById('editTA').value.trim();
  if (!txt) return closeEdit();
  pushUndo();
  n.el.setAttribute('data-text', txt);
  if (n.el.getAttribute('data-type')==='text') {
    n.el.innerHTML = esc(txt);
  } else {
    const bd = n.el.querySelector('.node-body');
    if (bd) bd.innerHTML = esc(txt).replace(/\n/g,'<br>');
  }
  saveLocal(); closeEdit(); showToast('保存しました');
}

function delCurrent() {
  if (!editId) return;
  pushUndo(); deleteNode(editId); closeEdit();
}

function closeEdit() {
  document.getElementById('editPop').style.display='none';
  editId=null;
}

function editKeydown(e) {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') saveEdit();
  if (e.key==='Escape') closeEdit();
}

cvsEl.addEventListener('click', closeEdit);

// ======== DELETE ========
function deleteNode(id) {
  const n = nodes.find(n=>n.id===id);
  if (!n) return;
  n.lines.forEach(l => {
    try { l.remove(); } catch(e) {}
    conns = conns.filter(c=>c.line!==l);
  });
  n.el.remove();
  nodes = nodes.filter(n=>n.id!==id);
  if (selId===id) selId=null;
  saveLocal(); updateStatus();
}

// ======== UNDO ========
function pushUndo() {
  const s = JSON.stringify(getState());
  if (!undoStack.length || undoStack[undoStack.length-1]!==s) {
    undoStack.push(s);
    if (undoStack.length>40) undoStack.shift();
  }
}

function undo() {
  if (!undoStack.length) { showToast('これ以上戻れません'); return; }
  clearCanvas();
  applyState(JSON.parse(undoStack.pop()));
  saveLocal(); updateStatus();
}

// ======== STATE ========
function getState() {
  return {
    nodes: nodes.map(n=>({
      id:n.id, type:n.el.getAttribute('data-type'),
      cat:n.el.getAttribute('data-cat'),
      color:n.el.getAttribute('data-color'),
      text:n.el.getAttribute('data-text'),
      left:n.el.style.left, top:n.el.style.top,
      width:n.el.style.width, height:n.el.style.height
    })),
    leaderLines: conns.map(c=>({ startId:c.startId, endId:c.endId })),
    freeLines: Array.from(document.querySelectorAll('.drawn-line')).map(l=>l.getAttribute('points'))
  };
}

function applyState(s) {
  if (!s) return;
  (s.nodes||[]).forEach(n=>createNode(n,true));
  (s.leaderLines||[]).forEach(l=>drawLL(l.startId,l.endId));
  (s.freeLines||[]).forEach(p=>{
    const l = document.createElementNS('http://www.w3.org/2000/svg','polyline');
    l.setAttribute('class','drawn-line'); l.setAttribute('points',p);
    l.addEventListener('click', ev=>{ ev.stopPropagation(); pushUndo(); l.remove(); saveLocal(); });
    svgEl.appendChild(l);
  });
}

function clearCanvas() {
  conns.forEach(c=>{ try{c.line.remove()}catch(e){} });
  conns=[];
  nodes.forEach(n=>n.el.remove());
  nodes=[];
  document.querySelectorAll('.drawn-line').forEach(l=>l.remove());
  selId=null;
}

function clearSel() {
  if (selId) { document.getElementById(selId)?.classList.remove('selected'); selId=null; }
}

// ======== STORAGE ========
function saveLocal() {
  localStorage.setItem(SKEY, JSON.stringify(getState()));
  const b = document.getElementById('savedBadge');
  b.style.opacity=1; setTimeout(()=>b.style.opacity=0, 1500);
}

function loadLocal() {
  const raw = localStorage.getItem(SKEY) || localStorage.getItem('thinkflow_resizable_pro');
  if (raw) { try { applyState(JSON.parse(raw)); } catch(e) { console.warn('Load error', e); } }
}

function clearAll() {
  if (confirm('全データを消去しますか？\nこの操作は取り消せません。')) {
    [SKEY,'thinkflow_resizable_pro'].forEach(k=>localStorage.removeItem(k));
    location.reload();
  }
}

function downloadData() {
  const raw = localStorage.getItem(SKEY);
  if (!raw) { showToast('保存データがありません'); return; }
  const a = Object.assign(document.createElement('a'),{
    href: URL.createObjectURL(new Blob([raw],{type:'application/json'})),
    download: `thinkflow_${new Date().toISOString().slice(0,10)}.json`
  });
  a.click();
  showToast('保存しました');
}

function importData() {
  const i = Object.assign(document.createElement('input'),{type:'file',accept:'.json,.txt'});
  i.onchange = e => {
    const r = new FileReader();
    r.onload = re => {
      try {
        localStorage.setItem(SKEY, re.target.result);
        location.reload();
      } catch(e) { showToast('読込に失敗しました'); }
    };
    r.readAsText(e.target.files[0]);
  };
  i.click();
}

// ======== PDF ========
async function exportPDF() {
  showToast('PDF生成中...');
  try {
    // Temporarily hide leader-line elements for cleaner capture
    const llEls = document.querySelectorAll('.leader-line');
    llEls.forEach(l=>l.style.display='none');

    const canvas = await html2canvas(cvsEl, {
      scale:2, backgroundColor:'#f9fafb', useCORS:true, logging:false
    });

    llEls.forEach(l=>l.style.display='');

    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF('l','mm','a4');
    const W=297, H=210;
    const ratio = Math.min(W/canvas.width, H/canvas.height) * 2;
    const pw = canvas.width * ratio / 2;
    const ph = canvas.height * ratio / 2;
    const ox = (W-pw)/2, oy = (H-ph)/2;
    pdf.addImage(canvas.toDataURL('image/png'),'PNG', ox, oy, pw, ph);
    pdf.save(`thinkflow_${new Date().toISOString().slice(0,10)}.pdf`);
    showToast('PDF保存しました');
  } catch(e) { showToast('PDF生成に失敗しました'); console.error(e); }
}

// ======== HELPERS ========
function updateStatus() {
  document.getElementById('nc').textContent = nodes.length;
  document.getElementById('cc').textContent = conns.length;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
