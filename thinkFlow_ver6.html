<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkFlow Pro - Image Resizing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>
    <style>
        body { background-color: #f1f5f9; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .canvas-container { 
            flex: 1; position: relative; overflow: hidden; 
            border-radius: 1.5rem; margin: 0 24px 24px 24px;
            background-color: #ffffff;
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); 
            background-size: 30px 30px;
        }
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; pointer-events: none; }
        
        /* Node Styles */
        .node { position: absolute; cursor: grab; user-select: none; z-index: 20; min-width: 50px; pointer-events: auto; }
        .node.selected { outline: 4px solid #6366f1; outline-offset: 4px; z-index: 50; }
        .node-box { padding: 14px; border-radius: 12px; border: 2px solid; background: white; width: 100%; height: 100%; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .node-text-only { border: none; background: transparent; font-weight: 900; font-size: 1.8rem; color: #1e293b; white-space: nowrap; }
        
        /* Image Node Specific */
        .node-image { padding: 4px; background: white; border-radius: 12px; border: 2px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); display: flex; }
        .node-image img { border-radius: 8px; width: 100%; height: 100%; display: block; pointer-events: none; object-fit: contain; }

        /* Resizer Handle */
        .resizer { width: 16px; height: 16px; background: #6366f1; position: absolute; right: 0; bottom: 0; cursor: se-resize; border-radius: 4px 0 10px 0; opacity: 0; z-index: 30; }
        .node:hover .resizer { opacity: 1; }

        /* Categories */
        .cat-assets { border-color: #3b82f6; color: #1e40af; background-color: #eff6ff; }
        .cat-reality { border-color: #94a3b8; color: #1e293b; background-color: #f8fafc; }
        .cat-emotion { border-color: #ec4899; color: #9d174d; background-color: #fdf2f8; }
        .cat-projected { border-color: #f59e0b; color: #92400e; background-color: #fffbeb; }
        .cat-mechanism { border-color: #6366f1; color: #3730a3; background-color: #eef2ff; }
        .cat-ideal { border-color: #10b981; color: #065f46; background-color: #f0fdf4; }

        /* SVGs */
        #svgLayer { position: absolute; top: 0; left: 0; width: 10000px; height: 10000px; overflow: visible; }
        .drawn-line { stroke: #000; stroke-width: 3; fill: none; }
        .temp-line { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 5; fill: none; }

        /* Tools */
        .mode-move { cursor: grab !important; }
        .mode-pen { cursor: crosshair !important; }
        .mode-eraser { cursor: cell !important; }

        body.eraser-active .leader-line { pointer-events: auto !important; z-index: 99999 !important; }
        body.eraser-active .leader-line path { cursor: pointer !important; pointer-events: auto !important; stroke-width: 20px !important; stroke: rgba(239, 68, 68, 0.01) !important; }
        body.eraser-active .leader-line path:nth-child(2) { stroke: rgba(239, 68, 68, 1) !important; stroke-width: 4px !important; }
    </style>
</head>
<body class="p-6">
    <div class="mx-auto w-full max-w-[1600px]">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-black italic tracking-tighter uppercase text-slate-800">THINKFLOW <span class="text-indigo-600">PRO</span></h1>
                <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200 gap-1">
                    <button id="btn-move" onclick="setTool('move')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition">移動</button>
                    <button id="btn-pen" onclick="setTool('pen')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition">ペン</button>
                    <button id="btn-eraser" onclick="setTool('eraser')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition">消しゴム</button>
                </div>
            </div>
            <div class="flex gap-2 font-bold text-[10px]">
                <button onclick="resetView()" class="bg-slate-100 px-4 py-2 rounded-xl">視点リセット</button>
                <button onclick="clearAll()" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl">全消去</button>
            </div>
        </header>
    </div>

    <div class="flex flex-1 overflow-hidden gap-6 px-6 pb-6">
        <div class="w-80 bg-white p-6 rounded-3xl shadow-xl border border-slate-200 space-y-6 h-full overflow-y-auto">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setNodeDisplayMode('box')" id="modeBox" class="p-2 text-xs font-bold rounded-lg border-2 border-indigo-500 bg-indigo-50 text-indigo-700">枠あり</button>
                <button onclick="setNodeDisplayMode('text')" id="modeText" class="p-2 text-xs font-bold rounded-lg border-2 border-slate-100 bg-white text-slate-400">枠なし</button>
            </div>
            <select id="catSelect" class="w-full border-2 border-slate-50 p-3 rounded-xl text-sm font-bold bg-slate-50 outline-none">
                <option value="資産・実績">資産・実績</option><option value="現実・制約">現実・制約</option>
                <option value="感情・動機">感情・動機</option><option value="想定推移">想定推移</option>
                <option value="仕組み・手段">仕組み・手段</option><option value="理想・目的">理想・目的</option>
            </select>
            <textarea id="nodeInput" placeholder="思考を入力..." class="w-full border-2 border-slate-50 p-4 rounded-xl text-sm h-32 outline-none font-bold"></textarea>
            <button onclick="handleMainBtnClick()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black italic uppercase shadow-md active:scale-95 transition">要素を追加</button>
            
            <div class="pt-4 border-t border-slate-100">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">画像を挿入</label>
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                <button onclick="document.getElementById('imageInput').click()" class="w-full bg-indigo-50 text-indigo-600 py-3 rounded-xl font-bold text-xs border border-indigo-100 hover:bg-indigo-100">画像を選択</button>
            </div>
        </div>

        <div class="canvas-container mode-move" id="container" onmousedown="onCanvasDown(event)" oncontextmenu="return false;">
            <div id="viewport">
                <svg id="svgLayer"></svg>
                <div id="nodeLayer"></div>
            </div>
        </div>
    </div>

    <script>
        let tool = 'move', nodeDisplayMode = 'box', nodes = [], connections = [], selectedId = null;
        let scale = 1, panX = 0, panY = 0;
        
        const container = document.getElementById('container');
        const viewport = document.getElementById('viewport');
        const svgLayer = document.getElementById('svgLayer');
        const nodeLayer = document.getElementById('nodeLayer');

        function setTool(t) {
            tool = t;
            ['move', 'pen', 'eraser'].forEach(id => {
                document.getElementById('btn-' + id).className = `px-4 py-1.5 rounded-lg text-xs font-bold transition ${tool===id?'bg-indigo-600 text-white':'text-slate-400'}`;
            });
            container.className = `canvas-container mode-${tool}`;
            if(tool === 'eraser') document.body.classList.add('eraser-active');
            else document.body.classList.remove('eraser-active');
            connections.forEach(c => c.line.position());
        }

        function setNodeDisplayMode(m) {
            nodeDisplayMode = m;
            document.getElementById('modeBox').className = m === 'box' ? 'p-2 text-xs font-bold rounded-lg border-2 border-indigo-500 bg-indigo-50 text-indigo-700' : 'p-2 text-xs font-bold rounded-lg border-2 border-slate-100 bg-white text-slate-400';
            document.getElementById('modeText').className = m === 'text' ? 'p-2 text-xs font-bold rounded-lg border-2 border-indigo-500 bg-indigo-50 text-indigo-700' : 'p-2 text-xs font-bold rounded-lg border-2 border-slate-100 bg-white text-slate-400';
        }

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = Math.min(Math.max(scale * delta, 0.2), 4);
            const rect = container.getBoundingClientRect();
            panX = (e.clientX - rect.left) - ((e.clientX - rect.left) - panX) * (newScale / scale);
            panY = (e.clientY - rect.top) - ((e.clientY - rect.top) - panY) * (newScale / scale);
            scale = newScale;
            updateTransform();
        }, { passive: false });

        function updateTransform() {
            container.style.backgroundPosition = `${panX}px ${panY}px`;
            container.style.backgroundSize = `${30 * scale}px ${30 * scale}px`;
            viewport.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            connections.forEach(c => c.line.position());
        }

        function onCanvasDown(e) {
            const rect = container.getBoundingClientRect();
            if (tool === 'move') {
                let sx = e.clientX, sy = e.clientY, ox = panX, oy = panY;
                const mm = (me) => { panX = ox + (me.clientX - sx); panY = oy + (me.clientY - sy); updateTransform(); };
                const mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
                document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
            } else if (tool === 'pen') {
                if (e.target !== container && e.target.id !== 'svgLayer') return;
                let startX = (e.clientX - rect.left - panX) / scale;
                let startY = (e.clientY - rect.top - panY) / scale;
                let temp = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
                temp.setAttribute("class", "temp-line");
                svgLayer.appendChild(temp);
                const mm = (me) => {
                    let cx = (me.clientX - rect.left - panX) / scale;
                    let cy = (me.clientY - rect.top - panY) / scale;
                    temp.setAttribute("points", `${startX},${startY} ${cx},${cy}`);
                };
                const mu = () => {
                    if (temp.getAttribute("points")) {
                        const l = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
                        l.setAttribute("class", "drawn-line");
                        l.setAttribute("points", temp.getAttribute("points"));
                        l.onclick = (ev) => { if(tool==='eraser') { ev.stopPropagation(); l.remove(); } };
                        svgLayer.appendChild(l);
                    }
                    temp.remove();
                    document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu);
                };
                document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
            }
        }

        function handleMainBtnClick() {
            if (selectedId) updateNode(selectedId);
            else createNode();
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                createNode({ type: 'image', src: event.target.result });
            };
            reader.readAsDataURL(file);
        }

        function createNode(data = null) {
            const el = document.createElement('div');
            const id = "n" + Date.now(); el.id = id;
            const type = data?.type || nodeDisplayMode;
            
            if (type === 'image') {
                el.className = 'node node-image';
                el.style.width = "200px";
                el.innerHTML = `<img src="${data.src}">`;
                addResizer(el);
            } else {
                const text = data ? data.text : document.getElementById('nodeInput').value;
                if (!text.trim()) return;
                const cat = data ? data.cat : document.getElementById('catSelect').value;
                applyNodeStyle(el, type, text, cat);
            }

            const rect = container.getBoundingClientRect();
            el.style.left = ((-panX + rect.width/2 - 100)/scale) + "px";
            el.style.top = ((-panY + rect.height/2 - 100)/scale) + "px";

            el.onmousedown = (e) => {
                if(tool === 'eraser' || e.target.classList.contains('resizer')) return;
                e.stopPropagation();
                let sx = e.clientX, sy = e.clientY, ol = parseFloat(el.style.left), ot = parseFloat(el.style.top);
                const mm = (me) => {
                    el.style.left = (ol + (me.clientX - sx) / scale) + "px";
                    el.style.top = (ot + (me.clientY - sy) / scale) + "px";
                    connections.forEach(c => c.line.position());
                };
                const mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
                document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
            };

            el.onclick = (e) => {
                e.stopPropagation();
                if (tool === 'eraser') return;
                if (!selectedId) {
                    selectedId = id; el.classList.add('selected');
                } else if (selectedId === id) {
                    deselect();
                } else {
                    connectNodes(selectedId, id);
                    deselect();
                }
            };

            el.oncontextmenu = (e) => { e.preventDefault(); deleteNode(id); };
            nodeLayer.appendChild(el);
            nodes.push({ id, el });
            document.getElementById('nodeInput').value = '';
        }

        function addResizer(node) {
            const resizer = document.createElement('div');
            resizer.className = 'resizer';
            node.appendChild(resizer);
            resizer.onmousedown = (e) => {
                e.stopPropagation(); e.preventDefault();
                let startW = node.offsetWidth, startH = node.offsetHeight, sx = e.clientX, sy = e.clientY;
                const mm = (me) => {
                    const newW = startW + (me.clientX - sx) / scale;
                    node.style.width = newW + "px";
                    // テキストノード以外（画像など）はアスペクト比を何となく維持
                    if(node.classList.contains('node-image')) {
                        node.style.height = "auto";
                    }
                    connections.forEach(c => c.line.position());
                };
                const mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
                document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
            };
        }

        function applyNodeStyle(el, type, text, cat) {
            el.innerHTML = ''; el.setAttribute('data-type', type); el.setAttribute('data-cat', cat);
            if (type === 'text') {
                el.className = 'node node-text-only'; el.innerHTML = text.replace(/\n/g, '<br>');
            } else {
                el.className = 'node';
                const inner = document.createElement('div');
                inner.className = `node-box ${getCatClass(cat)}`;
                inner.innerHTML = `<div class="text-[8px] opacity-50 font-black uppercase">${cat}</div><div class="text-sm font-bold">${text.replace(/\n/g, '<br>')}</div>`;
                el.appendChild(inner);
                addResizer(el);
            }
        }

        function connectNodes(sid, eid) {
            const line = new LeaderLine(document.getElementById(sid), document.getElementById(eid), {
                color: '#000', size: 2, path: 'fluid', endPlug: 'arrow'
            });
            const conn = { line, sid, eid };
            connections.push(conn);
            setTimeout(() => {
                const svgs = document.querySelectorAll('.leader-line');
                const lastSvg = svgs[svgs.length - 1];
                if(lastSvg) {
                    lastSvg.addEventListener('mousedown', (e) => {
                        if(tool === 'eraser') {
                            e.stopPropagation(); e.preventDefault();
                            line.remove();
                            connections = connections.filter(x => x !== conn);
                        }
                    });
                }
            }, 100);
        }

        function getCatClass(c) {
            const m = {'資産・実績': 'cat-assets', '現実・制約': 'cat-reality', '感情・動機': 'cat-emotion', '想定推移': 'cat-projected', '仕組み・手段': 'cat-mechanism', '理想・目的': 'cat-ideal'};
            return m[c] || 'cat-ideal';
        }

        function deselect() {
            if (selectedId) { document.getElementById(selectedId)?.classList.remove('selected'); selectedId = null; }
            document.getElementById('nodeInput').value = '';
        }

        function resetView() { panX = 0; panY = 0; scale = 1; updateTransform(); }
        function deleteNode(id) {
            const n = nodes.find(x => x.id === id); if(!n) return;
            connections.filter(c => c.sid === id || c.eid === id).forEach(c => { c.line.remove(); connections = connections.filter(x => x !== c); });
            n.el.remove(); nodes = nodes.filter(x => x.id !== id);
            deselect();
        }
        function clearAll() { if(confirm("消去しますか？")) location.reload(); }
    </script>
</body>
</html>
